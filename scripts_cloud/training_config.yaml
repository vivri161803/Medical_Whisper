# ===========================================================================
# training_config.yaml — Configurazione per fine-tuning PyTorch su GPU Cloud
# ===========================================================================
# Ottimizzato per RunPod L4 (24GB VRAM).

model:
  name: "openai/whisper-large-v2"  # openai/whisper-small | medium | large-v2
  language: "it"

lora: # Conoscenza Finale = Vecchia Conoscenza + (Nuova Conoscenza * alpha/rank)
  rank: 64
  alpha: 128 
  dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "out_proj", "fc1", "fc2"]

training:
  batch_size: 16
  gradient_accumulation_steps: 2      # Effective batch = 16 × 2 = 32
  learning_rate: 1.0e-4
  num_epochs: 30
  warmup_steps: 100
  weight_decay: 0.01
  max_grad_norm: 1.0
  fp16: true
  gradient_checkpointing: true        # Riduce VRAM ~40%
  logging_steps: 10
  eval_steps: 200
  save_steps: 400
  save_total_limit: 2               # Max checkpoint salvati

evaluation:
  medical_terms_path: "data/medical_terms.txt"
  medical_weight: 3.0

data:
  preprocessed_dir: "data/preprocessed"
  output_dir: "outputs_cloud_large"
  seed: 42

early_stopping:
  enabled: true
  patience: 3
  metric: "eval_loss"    # "eval_loss" | "eval_medical_wer"
  min_delta: 0.001

wandb:
  project: "whisper-medical-finetuning"
  entity: null
  run_name: null          # auto-generato se null
  tags: ["pytorch", "lora", "cloud", "runpod"]
