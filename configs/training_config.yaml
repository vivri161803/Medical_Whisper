# ============================================================
# Training Configuration — Whisper Fine-Tuning Medico
# ============================================================
# Modifica questi parametri per personalizzare il training.
# Per passare a un modello più grande (es. su GPU NVIDIA):
#   1. Cambia model_name a "openai/whisper-medium"
#   2. Aumenta per_device_train_batch_size se hai VRAM sufficiente
#   3. Abilita fp16: true

# --- Modello ---
model_name: "openai/whisper-small"
language: "it"
task: "transcribe"

# --- Output ---
output_dir: "outputs/whisper-medical"

# --- Training ---
learning_rate: 1.0e-5
warmup_steps: 500
per_device_train_batch_size: 2
gradient_accumulation_steps: 8    # effective batch size = 16
num_train_epochs: 10

# --- Evaluation & Saving ---
eval_strategy: "epoch"
save_strategy: "epoch"
load_best_model_at_end: true
metric_for_best_model: "wer"
greater_is_better: false

# --- Logging ---
logging_steps: 25

# --- Performance ---
fp16: false                       # MPS non supporta FP16 per il training
dataloader_num_workers: 0         # 0 è più stabile su macOS

# --- Dataset ---
val_split: 0.1                    # 10% per validation
max_input_length: 30.0            # max secondi per segmento
seed: 42
